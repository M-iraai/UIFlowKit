<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aurora Bento-Split Navigation</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* --- CSS RESET & BASE STYLES --- */
    /* --- CSS RESET & BASE STYLES --- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  max-width: 100%;
  overflow: hidden; /* Hard block on horizontal scrolling */
}

body {
  background-color: #030712;
  color: #ffffff;
  height: 100vh;
  font-family:
    "Inter",
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* --- AMBIENT BACKGROUND GLOWS --- */
.glow-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(140px);
  mix-blend-mode: plus-lighter;
  pointer-events: none;
  z-index: 0;
}

.orb-1 {
  top: -10%;
  left: 20%;
  width: 500px;
  height: 500px;
  background: rgba(79, 70, 229, 0.2);
  animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.orb-2 {
  top: 20%;
  right: 15%;
  width: 600px;
  height: 600px;
  background: rgba(147, 51, 234, 0.15);
}

@keyframes pulse {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.5;
  }
}

/* --- CORE BENTO GLASS STYLING --- */
.glass-panel {
  background: rgba(13, 17, 28, 0.45);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    inset 0 0 1px rgba(255, 255, 255, 0.3),
    0 8px 32px 0 rgba(0, 0, 0, 0.25);
  border-radius: 1rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* --- HEADER & NAVIGATION LAYOUT --- */
.header-wrapper {
  position: fixed;
  top: 24px;
  left: 0;
  right: 0;
  z-index: 50;
  padding: 0 16px;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
}

.header-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

/* Pod 1: Brand */
.brand-pod {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  flex-shrink: 0;
}

.brand-pod:hover {
  border-color: rgba(255, 255, 255, 0.2);
}

.logo-container {
  position: relative;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-cube {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  border-radius: 8px;
  transform: rotate(45deg);
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
}

.brand-pod:hover .logo-cube {
  transform: rotate(90deg);
}

.logo-text {
  position: relative;
  z-index: 10;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.05em;
}

.brand-name {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.02em;
  color: rgba(255, 255, 255, 0.95);
}

/* Pod 2: Desktop Links Menu */
.nav-container {
  display: none;
  position: relative;
  align-items: center;
  gap: 4px;
  padding: 10px;
  border-radius: 9999px;
}

.nav-link {
  position: relative;
  z-index: 10;
  padding: 6px 16px;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  transition: color 0.2s ease;
}

.nav-link:hover {
  color: #ffffff;
}

#sliding-pill {
  position: absolute;
  height: 36px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 9999px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
  pointer-events: none;
  opacity: 0;
  left: 0;
  transform: scale(0.95);
  transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Pod 3: Actions Layout */
.actions-pod {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.utilities-capsule {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 6px;
  border-radius: 1rem;
}

.utility-btn {
  background: transparent;
  border: none;
  color: rgba(255, 255, 255, 0.6);
  padding: 8px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.utility-btn:hover {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.05);
}

.utility-divider {
  width: 1px;
  height: 20px;
  background: rgba(255, 255, 255, 0.1);
}

.status-indicator {
  position: relative;
  display: flex;
  width: 8px;
  height: 8px;
}

.status-ping {
  position: absolute;
  display: inline-flex;
  height: 100%;
  width: 100%;
  border-radius: 50%;
  background-color: #34d399;
  opacity: 0.75;
  animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
}

.status-dot {
  position: relative;
  display: inline-flex;
  border-radius: 50%;
  height: 8px;
  width: 8px;
  background-color: #10b981;
}

@keyframes ping {
  75%,
  100% {
    transform: scale(2);
    opacity: 0;
  }
}

.cta-container {
  padding: 4px;
  border-radius: 1rem;
}

.cta-btn {
  background: linear-gradient(to right, #4f46e5, #9333ea);
  color: #ffffff;
  border: none;
  font-weight: 500;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.1);
  transition: all 0.3s ease;
}

.cta-btn:hover {
  background: linear-gradient(to right, #6366f1, #a855f7);
  box-shadow: 0 4px 12px 0 rgba(99, 102, 241, 0.2);
}

.cta-btn:active {
  transform: scale(0.95);
}

#menu-toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(13, 17, 28, 0.45);
  border-radius: 1rem;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

#menu-toggle-btn:active {
  transform: scale(0.95);
}

#hamburger-icon {
  width: 20px;
  height: 20px;
  transition: transform 0.3s ease;
}

#hamburger-icon.rotate-90 {
  transform: rotate(90deg);
}

/* --- MOBILE OVERLAY DRAWER --- */
#mobile-menu-drawer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 40;
  background: rgba(3, 7, 18, 0.98);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 32px;
  box-sizing: border-box;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-10px);
}

#mobile-menu-drawer.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.drawer-spacer {
  height: 80px;
}

.mobile-nav-stack {
  display: flex;
  flex-direction: column;
  gap: 24px;
  text-align: center;
  margin: auto 0;
}

.mobile-nav-link {
  font-size: 30px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.6);
  text-decoration: none;
  letter-spacing: -0.02em;
  transform: translateY(16px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

#mobile-menu-drawer.open .mobile-nav-link {
  opacity: 1;
  transform: translateY(0);
}

.mobile-nav-link:hover {
  color: #ffffff;
}

.mobile-footer {
  display: flex;
  flex-direction: column;
  gap: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding-top: 32px;
  margin-top: auto;
  text-align: center;
  transform: translateY(16px);
  opacity: 0;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#mobile-menu-drawer.open .mobile-footer {
  opacity: 1;
  transform: translateY(0);
}

.mobile-status-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 16px;
}

.mobile-meta-text {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.4);
}

.mobile-cta-btn {
  width: 100%;
  background: linear-gradient(to right, #4f46e5, #9333ea);
  color: #ffffff;
  border: none;
  font-weight: 500;
  padding: 16px;
  border-radius: 1rem;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.25);
}

/* --- RESPONSIVE MEDIA QUERIES --- */
@media (min-width: 640px) {
  .utilities-capsule {
    display: flex;
  }
}

@media (min-width: 768px) {
  .nav-container {
    display: flex;
  }
  #menu-toggle-btn {
    display: none;
  }
}

/* Custom scrollbar adjustments */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 999px;
}

  </style>
</head>
<body>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<header class="header-wrapper">
  <div class="header-container">
    <div class="glass-panel brand-pod">
      <div class="logo-container">
        <div class="logo-cube"></div>
        <span class="logo-text">A</span>
      </div>
      <span class="brand-name">AURORA</span>
    </div>
    <nav class="glass-panel nav-container">
      <div id="sliding-pill"></div>
      <a href="#features" class="nav-link">Features</a
      ><a href="#pricing" class="nav-link">Pricing</a
      ><a href="#integrations" class="nav-link">Integrations</a
      ><a href="#resources" class="nav-link">Resources</a>
    </nav>
    <div class="actions-pod">
      <div class="glass-panel utilities-capsule">
        <button class="utility-btn" aria-label="Search Platform">
          <svg
            style="width: 16px; height: 16px"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </button>
        <div class="utility-divider"></div>
        <button class="utility-btn" aria-label="System status">
          <span class="status-indicator"
            ><span class="status-ping"></span><span class="status-dot"></span
          ></span>
        </button>
      </div>
      <div class="glass-panel cta-container">
        <button class="cta-btn">Launch System</button>
      </div>
      <button id="menu-toggle-btn" aria-label="Toggle navigation menu">
        <svg
          id="hamburger-icon"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 9h16.5m-16.5 6.75h16.5"
          />
        </svg>
      </button>
    </div>
  </div>
</header>
<div id="mobile-menu-drawer">
  <div class="drawer-spacer"></div>
  <nav class="mobile-nav-stack">
    <a href="#features" class="mobile-nav-link" style="transition-delay: 0ms"
      >Features</a
    ><a href="#pricing" class="mobile-nav-link" style="transition-delay: 75ms"
      >Pricing</a
    ><a
      href="#integrations"
      class="mobile-nav-link"
      style="transition-delay: 100ms"
      >Integrations</a
    ><a
      href="#resources"
      class="mobile-nav-link"
      style="transition-delay: 150ms"
      >Resources</a
    >
  </nav>
  <div class="mobile-footer" style="transition-delay: 200ms">
    <div class="mobile-status-row">
      <span class="mobile-meta-text">Status: Operational</span
      ><span class="mobile-meta-text">v2.4.0</span>
    </div>
    <button class="mobile-cta-btn">Initialize Dashboard</button>
  </div>
</div>

  

  <script>
    const slidingPill = document.getElementById("sliding-pill");
const navLinks = document.querySelectorAll(".nav-link");
const bentoContainer = document.querySelector(".nav-container");

navLinks.forEach((link) => {
  link.addEventListener("mouseenter", (e) => {
    const linkRect = e.target.getBoundingClientRect();
    const containerRect = bentoContainer.getBoundingClientRect();
    const relativeLeft = linkRect.left - containerRect.left;

    slidingPill.style.width = `${linkRect.width}px`;
    slidingPill.style.transform = `translateX(${relativeLeft}px) scale(1)`;
    slidingPill.style.opacity = "1";
  });
});

bentoContainer.addEventListener("mouseleave", () => {
  slidingPill.style.opacity = "0";
  slidingPill.style.transform = "scale(0.95)";
});

const menuToggleBtn = document.getElementById("menu-toggle-btn");
const hamburgerIcon = document.getElementById("hamburger-icon");
const mobileMenuDrawer = document.getElementById("mobile-menu-drawer");
const mobileLinks = document.querySelectorAll(".mobile-nav-link");

let isMenuOpen = false;

menuToggleBtn.addEventListener("click", () => {
  isMenuOpen = !isMenuOpen;

  if (isMenuOpen) {
    hamburgerIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />`;
    hamburgerIcon.classList.add("rotate-90");
    mobileMenuDrawer.classList.add("open");
    document.body.style.overflow = "hidden";
  } else {
    closeMobileMenu();
  }
});

mobileLinks.forEach((link) => {
  link.addEventListener("click", closeMobileMenu);
});

function closeMobileMenu() {
  isMenuOpen = false;
  hamburgerIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5" />`;
  hamburgerIcon.classList.remove("rotate-90");
  mobileMenuDrawer.classList.remove("open");
  document.body.style.overflow = "auto";
}

  </script>

</body>
</html>
