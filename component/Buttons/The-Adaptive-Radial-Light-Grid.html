<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adaptive Radial Light-Grid</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .btn-matrix {
  --x: 0px;
  --y: 0px;
  position: relative;
  background: #070708;
  color: #f4f4f5;
  padding: 20px 40px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid #1f1f23;
  border-radius: 6px;
  cursor: pointer;
  overflow: hidden;
  box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.7);
}

/* Layer 1: Digital Dot Matrix Texture */
.matrix-grid {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: 0.15;
  background-image: radial-gradient(
    rgba(255, 255, 255, 0.3) 1px,
    transparent 0
  );
  background-size: 4px 4px;
  transition: opacity 0.4s ease;
}

/* Layer 2: Complex Coordinate-Based Radial Emissive Glow */
.matrix-glow {
  position: absolute;
  inset: 0;
  z-index: 2;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  background: radial-gradient(
    130px circle at var(--x) var(--y),
    rgba(14, 165, 233, 0.15) 0%,
    rgba(99, 102, 241, 0.08) 45%,
    transparent 100%
  );
}

/* Layer 3: Dynamic Sharp Border Fragment */
.btn-matrix::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 6px;
  padding: 1px;
  background: radial-gradient(
    90px circle at var(--x) var(--y),
    rgba(14, 165, 233, 1) 0%,
    rgba(99, 102, 241, 0.3) 60%,
    transparent 100%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.matrix-label {
  position: relative;
  z-index: 3;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
}

/* Interaction Mechanics */
.btn-matrix:hover .matrix-glow,
.btn-matrix:hover::after {
  opacity: 1;
}

.btn-matrix:hover .matrix-grid {
  opacity: 0.3;
}

.btn-matrix:active {
  transform: scale(0.98);
}

        </style>

</head>
<body>
  <button class="btn-matrix">
  <span class="matrix-grid"></span>
  <span class="matrix-glow"></span>
  <span class="matrix-label">Execute Protocol</span>
</button>

<script>
 const matrixButtons = document.querySelectorAll(".btn-matrix");

matrixButtons.forEach((button) => {
  button.addEventListener("mousemove", (event) => {
    button.style.setProperty("--x", `${event.offsetX}px`);
    button.style.setProperty("--y", `${event.offsetY}px`);
  });
});

</script>
</body>
</html>
