<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>The-Minimalist-Border-Draw-Button </title>
    <style>
        * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px; 
        align-items: center;
    }
   
    


.btn-draw {
  background: transparent;
  color: #111111;
  padding: 12px 32px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  border: none;
  position: relative;
  cursor: pointer;
  transition: color 0.4s ease;
}

/* Creating the top/bottom lines */
.btn-draw::before,
.btn-draw::after {
  content: '';
  position: absolute;
  height: 2px;
  width: 0;
  background: #111111;
  transition: width 0.3s ease;
}
.btn-draw::before { top: 0; left: 0; }
.btn-draw::after { bottom: 0; right: 0; }

/* Creating the left/right lines */
.btn-draw span::before,
.btn-draw span::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 0;
  background: #111111;
  transition: height 0.3s ease;
}
.btn-draw span::before { bottom: 0; left: 0; }
.btn-draw span::after { top: 0; right: 0; }

/* Hover effects to animate the lines */
.btn-draw:hover::before,
.btn-draw:hover::after {
  width: 100%;
}

.btn-draw:hover span::before,
.btn-draw:hover span::after {
  height: 100%;
}

.btn-draw:hover {
  color: #555555;
}
    </style>
</head>
<body>


    <button class="btn-draw">
  <span>Discover</span>
</button>



    <script>

        
    </script>
</body>
</html>
