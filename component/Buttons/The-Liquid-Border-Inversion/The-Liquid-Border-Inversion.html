<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px; 
        align-items: center;
    }
   
   .btn-chameleon {
  position: relative;
  background: transparent;
  padding: 12px 30px;
  font-size: 15px;
  font-weight: 600;
  border: 2px solid #18181b;
  border-radius: 30px;
  cursor: pointer;
  overflow: hidden;
}

.btn-chameleon::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #18181b;
  border-radius: 30px;
  transform: translateX(-101%);
  transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
  z-index: 1;
}

.btn-label {
  position: relative;
  display: block;
  color: #18181b;
  z-index: 2;
  mix-blend-mode: difference;
  transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
}

/* Hover Mechanics */
.btn-chameleon:hover::before {
  transform: translateX(0);
}

.btn-chameleon:hover .btn-label {
  color: #ffffff; /* Becomes white over the dark background due to mix-blend */
}
    </style>
</head>
<body>



    

<button class="btn-chameleon">
  <span class="btn-label" data-text="View Analytics">View Analytics</span>
</button>

    <script>

        
    </script>
</body>
</html>
